[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."warm-goo-stock"]
  # The job checks hourly, but only reaches Goo-net when the saved data is 24h old.
  schedule = "@hourly"

[[redirects]]
  from = "https://mycarcenter.netlify.app/*"
  to = "https://yamamoto-mycar.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/recruit.html"
  to = "/recruit"
  status = 301

[[redirects]]
  from = "/column.html"
  to = "/column/"
  status = 301

[[redirects]]
  from = "/column/recruit-work-life/"
  to = "/recruit-column/work-life/"
  status = 301
  force = true

[[redirects]]
  from = "/partner-repair-preview/*"
  to = "/business/:splat"
  status = 301
  force = true
