<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>計測除外設定｜山本マイカーセンター株式会社</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef7ff;
      color: #0f1b2d;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 560px);
      padding: 36px;
      border: 1px solid #d6e4f2;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(25, 74, 120, .12);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.6rem, 4vw, 2rem);
    }

    p {
      line-height: 1.8;
      color: #3a4a61;
    }

    .status {
      margin: 24px 0;
      padding: 16px;
      border-radius: 12px;
      background: #f4f9ff;
      font-weight: 700;
      color: #0f4f9a;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, #4aa3ff, #22c6d8);
    }

    .secondary {
      color: #0f4f9a;
      background: #e8f3ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>計測除外設定</h1>
    <p>この端末・このブラウザからのアクセスを、GA4とMicrosoft Clarityの計測対象から外します。社内PCや確認用スマホで一度設定してください。</p>
    <div class="status" id="status">確認中です</div>
    <div class="actions">
      <button class="primary" type="button" id="disable">このブラウザを計測しない</button>
      <button class="secondary" type="button" id="enable">計測対象に戻す</button>
    </div>
  </main>
  <script>
    (function () {
      var key = 'mcc_analytics_optout';
      var status = document.getElementById('status');

      function render() {
        var disabled = localStorage.getItem(key) === '1';
        status.textContent = disabled
          ? '現在、このブラウザは計測対象外です。'
          : '現在、このブラウザは計測対象です。';
      }

      document.getElementById('disable').addEventListener('click', function () {
        localStorage.setItem(key, '1');
        render();
      });

      document.getElementById('enable').addEventListener('click', function () {
        localStorage.removeItem(key);
        render();
      });

      render();
    })();
  </script>
</body>
</html>
